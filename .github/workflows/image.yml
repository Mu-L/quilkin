name: Build Container Image

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            cache_tag: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            cache_tag: arm64
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Gather information
        id: info
        run: |
          echo "toolchain_version=$(yq '.toolchain.channel' rust-toolchain.toml)" >> $GITHUB_OUTPUT
          echo "git_timestamp=$(git log -1 --pretty=%ct)" >> $GITHUB_OUTPUT

          echo "## Build information (${{ matrix.platform }})" >> $GITHUB_STEP_SUMMARY
          echo "|     |     |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          cat $GITHUB_OUTPUT | sed 's/\(.*\)=\(.*\)/| \1 | \2 |/' >> $GITHUB_STEP_SUMMARY

      - uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # build.rs runs git commands, need to preserve .git directory
          # https://docs.docker.com/reference/dockerfile/#buildkit-built-in-build-args
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1
            RUST_TOOLCHAIN=${{ steps.info.outputs.toolchain_version }}
          cache-from: type=registry,ref=ghcr.io/embarkstudios/quilkin:buildcache-${{ matrix.cache_tag }}
          cache-to: type=registry,ref=ghcr.io/embarkstudios/quilkin:buildcache-${{ matrix.cache_tag }},mode=max
          outputs: type=image,name=ghcr.io/embarkstudios/quilkin,push-by-digest=true,name-canonical=true,push=true
        env:
          # Set the build timestamp to the commit timestamp, so we can
          # hopefully get reproducible builds when built from the same commit
          # https://github.com/moby/buildkit/blob/master/docs/build-repro.md#source_date_epoch
          SOURCE_DATE_EPOCH: ${{ steps.info.outputs.git_timestamp }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.cache_tag }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Gather information
        id: info
        run: |
          echo "crate_version=$(yq '.workspace.package.version' Cargo.toml)" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Gather image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/embarkstudios/quilkin
          tags: |
            type=ref,event=tag
            type=sha,prefix=${{ steps.info.outputs.crate_version }}-

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/embarkstudios/quilkin@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect $(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
