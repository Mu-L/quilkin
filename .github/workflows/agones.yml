name: k8s

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "examples/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "examples/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  # Needed to read (and, on main, write) the buildx layer cache in ghcr.io.
  packages: write

env:
  CARGO_TERM_COLOR: always
  IMAGE_TAG: quilkin:ci
  NEXTEST_PROFILE: ci

jobs:
  agones:
    name: Agones
    runs-on: ubuntu-24.04
    env:
      RUST_BACKTRACE: "1"
      # dedicated buildx cache for the dev-profile test image: written on main, read on every run.
      BUILDCACHE_REF: ghcr.io/embarkstudios/quilkin:buildcache-agones-amd64
      BUILDCACHE_WRITE: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@1.91.1
      - uses: Swatinem/rust-cache@v2
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin
      - name: Run Agones integration tests
        run: ./crates/agones/setup-kind.sh all
      - name: Cluster diagnostics
        if: failure()
        run: ./crates/agones/setup-kind.sh diagnostics
